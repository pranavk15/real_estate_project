    <!DOCTYPE html>
    <html lang="en">

    <head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bank Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

    body{
    background:#040b1d;
    font-family:Arial;
    color:white;
    }

    .box{
    max-width:900px;
    margin:auto;
    margin-top:50px;
    background:#08152f;
    padding:40px;
    border-radius:30px;
    }

    .heading{
    font-size:45px;
    font-weight:bold;
    color:#00bfff;
    margin-bottom:30px;
    }

    .form-control{
    background:#0d1229;
    border:none;
    color:white;
    padding:15px;
    margin-bottom:20px;
    }

    .form-control:focus{
    background:#0d1229;
    color:white;
    box-shadow:none;
    border:1px solid #00bfff;
    }

    label{
    color:#00bfff;
    margin-bottom:8px;
    font-weight:bold;
    }

    .btn-update{
    background:#0d6efd;
    padding:14px 25px;
    border:none;
    border-radius:12px;
    color:white;
    font-size:18px;
    width:100%;
    }

    .btn-update:hover{
    background:#0056d6;
    }

    .btn-back{
    display:inline-block;
    margin-top:20px;
    text-decoration:none;
    color:white;
    }

    </style>

    </head>

    <body>

    <div class="box">

    <h1 class="heading">
    Update Agent Details
    </h1>

    <form action="/update_agent/{{ agent[0] }}" method="POST">

    <input type="text"
    name="fullname"
    value="{{ agent[1] }}"
    class="form-control mb-3">

    <input type="text"
    name="agency"
    value="{{ agent[2] }}"
    class="form-control mb-3">

    <input type="email"
    name="email"
    value="{{ agent[3] }}"
    class="form-control mb-3">

    <input type="text"
    name="phone"
    value="{{ agent[4] }}"
    class="form-control mb-3">

    <input type="text"
    name="address"
    value="{{ agent[6] }}"
    class="form-control mb-3">

    <button class="btn btn-primary">
    Update Agent
    </button>

    </form>
    </div>
    </body>
    </head>
    </html>
