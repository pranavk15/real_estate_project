<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luxury ERP</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#040b1d;
font-family:Arial;
color:white;
overflow-x:hidden;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:260px;
height:100vh;
background:linear-gradient(180deg,#08152f,#050b1f);
padding:30px 20px;
box-shadow:0 0 25px rgba(0,0,0,.5);
}

.logo{
font-size:42px;
font-weight:bold;
margin-bottom:50px;
}

.logo span{
color:#0d6efd;
}

.menu-item{
display:block;
padding:15px 20px;
margin-bottom:15px;
text-decoration:none;
color:white;
border-radius:15px;
transition:.3s;
font-size:18px;
}

.menu-item:hover{
background:#0d6efd;
transform:translateX(5px);
color:white;
}

.menu-item i{
margin-right:10px;
}

.main-content{
margin-left:280px;
padding:35px;
}

.page-title{
font-size:60px;
font-weight:bold;
margin-bottom:35px;
}

.section-box{
background:#08152f;
padding:35px;
border-radius:30px;
margin-bottom:35px;
box-shadow:0 0 25px rgba(0,0,0,.3);
}

.section-title{
font-size:40px;
font-weight:bold;
margin-bottom:25px;
color:#ffd700;
text-shadow:0 0 10px rgba(255,215,0,.4);
}

.table{
color:white;
}

.table th{
background:#0d1229;
color:#ffd700;
font-size:18px;
}

.table td{
vertical-align:middle;
font-size:17px;
}

.form-control{
background:#0d1229;
border:none;
color:white;
padding:15px;
margin-bottom:15px;
}

.form-control:focus{
background:#0d1229;
color:white;
box-shadow:none;
border:1px solid #0d6efd;
}

.btn-main{
background:#0d6efd;
border:none;
padding:12px 22px;
border-radius:12px;
color:white;
font-weight:bold;
text-decoration:none;
}

.btn-main:hover{
background:#0056d6;
color:white;
}

.badge{
padding:10px 18px;
font-size:14px;
}

@media(max-width:992px){

.sidebar{
position:relative;
width:100%;
height:auto;
}

.main-content{
margin-left:0;
}

.page-title{
font-size:45px;
}

}
    .upload-box{
background:#091a3d;
border:2px dashed #0d6efd;
border-radius:25px;
padding:35px;
text-align:center;
transition:.3s;
}

.upload-box:hover{
border-color:#ffd700;
}

.upload-label{
width:100%;
cursor:pointer;
}

.upload-icon{
font-size:55px;
color:#0d6efd;
margin-bottom:15px;
}

.upload-btn{
background:#0d6efd;
border:none;
padding:14px 30px;
border-radius:15px;
color:white;
font-weight:bold;
margin-top:15px;
}

.preview-container{
display:flex;
flex-wrap:wrap;
gap:15px;
margin-top:25px;
justify-content:center;
}

.preview-image{
width:140px;
height:140px;
object-fit:cover;
border-radius:20px;
border:3px solid #0d6efd;
box-shadow:0 10px 20px rgba(0,0,0,0.4);
transition:0.3s;
}

.preview-image:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h2 class="logo">
Luxury <span>ERP</span>
</h2>

{% block sidebar %}
{% endblock %}

</div>

<!-- MAIN CONTENT -->

<div class="main-content">

{% block content %}
{% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>



<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category, message in messages %}

<script>
Swal.fire({
    icon: "{{ 'success' if category == 'success' else 'error' }}",
    title: "{{ message }}"
});
</script>

{% endfor %}
{% endif %}
{% endwith %}

<!--- logout --->
<style>
.profile-btn{
background:#0d6efd;
color:white;
text-decoration:none;
padding:12px 25px;
border-radius:15px;
font-weight:bold;
transition:.3s;
display:inline-block;
}

.profile-btn:hover{
background:#0056d2;
transform:translateY(-3px);
color:white;
}

.logout-btn{
background:#dc3545;
color:white;
text-decoration:none;
padding:12px 25px;
border-radius:15px;
font-weight:bold;
transition:.3s;
display:inline-block;
}

.logout-btn:hover{
background:#b02a37;
transform:translateY(-3px);
color:white;
}
.agent-profile-card{
background:#08152f;
padding:35px;
border-radius:30px;
box-shadow:0 0 25px rgba(0,0,0,.35);
}

.agent-profile-image{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:5px solid #0d6efd;
box-shadow:0 0 20px rgba(13,110,253,.5);
}

.agent-name{
font-size:42px;
font-weight:800;
color:white;
margin-bottom:15px;
}

.agent-agency,
.agent-email,
.agent-phone{
font-size:18px;
color:#dfe6e9;
margin-bottom:10px;
}

.property-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(360px,1fr));
gap:35px;
}

.property-card{
background:#081733;
border-radius:30px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.45);
transition:.4s;
}

.property-card:hover{
transform:translateY(-10px);
}

.property-image{
width:100%;
height:260px;
object-fit:cover;
}

.property-content{
padding:25px;
}

.property-title{
font-size:34px;
font-weight:800;
color:white;
margin-bottom:15px;
}

.property-bank{
font-size:18px;
color:#dfe6e9;
margin-bottom:12px;
}

.property-location{
font-size:18px;
color:#dfe6e9;
margin-bottom:20px;
}

.property-price{
font-size:45px;
font-weight:800;
color:#ffd700;
margin-bottom:20px;
}

.minimum-box{
background:#0d6efd;
padding:12px;
border-radius:15px;
font-weight:bold;
margin-bottom:25px;
text-align:center;
}

.offer-input{
width:100%;
background:#0b1435;
border:none;
padding:16px;
border-radius:15px;
color:white;
margin-bottom:18px;
font-size:17px;
}

.offer-input:focus{
outline:none;
}

.offer-btn{
width:100%;
border:none;
background:#0d6efd;
padding:15px;
border-radius:15px;
font-weight:bold;
font-size:18px;
color:white;
transition:.3s;
}

.offer-btn:hover{
background:#0056d2;
transform:scale(1.03);
}

.analytics-card{
background:#08152f;
padding:30px;
border-radius:25px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,.35);
}

.analytics-card h5{
color:#dfe6e9;
margin-bottom:15px;
font-size:20px;
}

.analytics-card h1{
font-size:50px;
font-weight:bold;
color:#0d6efd;
}

.chart-box{
background:#08152f;
padding:30px;
border-radius:30px;
box-shadow:0 0 25px rgba(0,0,0,.35);
}

</style>

</body>
</html>
