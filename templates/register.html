<!-- templates/agent_register.html -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" conrtent="width=device-width, initial-scale=1.0">

<title>Agent Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#111;
font-family:Arial;
}

.register-section{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:50px 0;
}

.register-card{
background:white;
padding:40px;
border-radius:25px;
width:100%;
max-width:600px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.register-title{
font-size:50px;
font-weight:bold;
margin-bottom:10px;
text-align:center;
}

.register-subtitle{
text-align:center;
color:#666;
margin-bottom:30px;
}

.form-control{
padding:15px;
border-radius:12px;
margin-bottom:18px;
}

.btn-gold{
background:#c8ab67;
color:white;
padding:14px;
border:none;
border-radius:40px;
font-weight:bold;
width:100%;
}

.btn-gold:hover{
background:black;
}

.back-home{
text-decoration:none;
display:inline-block;
margin-bottom:20px;
font-weight:bold;
color:black;
}

</style>

</head>

<body>

<div class="container register-section">

<div class="register-card">

<a href="/login" class="back-home">
← Back
</a>

<h1 class="register-title">
Agent Registration
</h1>

<p class="register-subtitle">
Create your property agent account
</p>

<form>

<input type="text"
class="form-control"
placeholder="Full Name">

<input type="text"
class="form-control"
placeholder="Agency Name">

<input type="email"
class="form-control"
placeholder="Email Address">

<input type="text"
class="form-control"
placeholder="Phone Number">

<input type="password"
class="form-control"
placeholder="Password">

<input type="text"
class="form-control"
placeholder="Address">

<button class="btn-gold">
Register Agent
</button>

</form>

</div>

</div>

</body>
</html>
