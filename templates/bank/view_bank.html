<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bank Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#040b1d;
font-family:Arial;
color:white;
}

.box{
max-width:900px;
margin:auto;
margin-top:50px;
background:#08152f;
padding:40px;
border-radius:30px;
}

.heading{
font-size:45px;
font-weight:bold;
color:#00bfff;
margin-bottom:30px;
}

.form-control{
background:#0d1229;
border:none;
color:white;
padding:15px;
margin-bottom:20px;
}

.form-control:focus{
background:#0d1229;
color:white;
box-shadow:none;
border:1px solid #00bfff;
}

label{
color:#00bfff;
margin-bottom:8px;
font-weight:bold;
}

.btn-update{
background:#0d6efd;
padding:14px 25px;
border:none;
border-radius:12px;
color:white;
font-size:18px;
width:100%;
}

.btn-update:hover{
background:#0056d6;
}

.btn-back{
display:inline-block;
margin-top:20px;
text-decoration:none;
color:white;
}

</style>

</head>

<body>

<div class="box">

<h1 class="heading">
Update Bank
</h1>

<form action="/update_bank/{{ bank[0] }}" method="POST">

<label>Bank Name</label>

<input type="text"
name="bankname"
class="form-control"
value="{{ bank[1] }}"
required>

<label>Branch</label>

<input type="text"
name="branch"
class="form-control"
value="{{ bank[2] }}"
required>

<label>IFSC</label>

<input type="text"
name="ifsc"
class="form-control"
value="{{ bank[3] }}"
required>

<label>Email</label>

<input type="email"
name="email"
class="form-control"
value="{{ bank[4] }}"
required>

<label>Property Count</label>

<input type="number"
name="property_count"
class="form-control"
value="{{ bank[6] }}"
required>

<label>Address</label>

<input type="text"
name="address"
class="form-control"
value="{{ bank[7] }}"
required>

<button class="btn-update">
Update Bank
</button>

</form>

<a href="/admin/admin_dashboard" class="btn-back">
← Back Dashboard
</a>

</div>

</body>

</html>
